<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 12px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fdfdfd;
      border-radius: 8px;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .header {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      text-align: center;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: white;
      background: #007bff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover {
      background: #0056b3;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn.secondary {
      background: #6c757d;
    }
    .btn.secondary:hover {
      background: #5a6268;
    }
    .footer {
      font-size: 10px;
      color: #999;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Full-Site Screenshot</div>
    <button id="fullPage" class="btn">Capture Full Site</button>
    <div class="footer">Press Alt+Shift+S for quick capture</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
